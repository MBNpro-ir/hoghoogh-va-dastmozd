name: Build release artifacts

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: true

env:
  FLUTTER_STORAGE_BASE_URL: https://storage.googleapis.com
  PUB_HOSTED_URL: https://pub.dev

jobs:
  build_android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
          pub-cache-key: 'flutter-pub-:os:-:channel:-:version:-:arch:-:hash:'

      - name: Restore Android build cache
        uses: actions/cache@v5
        with:
          path: |
            .dart_tool
            build
            android/.gradle
          key: ${{ runner.os }}-android-build-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-android-build-

      - name: Get dependencies
        run: flutter pub get

      - name: Build APKs
        run: flutter build apk --release --split-per-abi --target-platform=android-arm,android-arm64

      - name: Build universal APK
        run: flutter build apk --release

      - name: Stage Android APKs
        run: |
          version="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          tag="v${version}"
          mkdir -p artifacts
          cp "$(find build/app/outputs -name 'app-armeabi-v7a-release.apk' -print -quit)" "artifacts/payroll-app-${tag}-android-arm.apk"
          cp "$(find build/app/outputs -name 'app-arm64-v8a-release.apk' -print -quit)" "artifacts/payroll-app-${tag}-android-arm64.apk"
          cp "$(find build/app/outputs -name 'app-release.apk' -print -quit)" "artifacts/payroll-app-${tag}-android-universal.apk"

      - name: Upload Android APKs
        uses: actions/upload-artifact@v7
        with:
          name: android-apks
          path: artifacts/*.apk
          if-no-files-found: error

  build_windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
          pub-cache-key: 'flutter-pub-:os:-:channel:-:version:-:arch:-:hash:'

      - name: Restore Windows build cache
        uses: actions/cache@v5
        with:
          path: |
            .dart_tool
            build/windows
            ~/.nuget/packages
          key: ${{ runner.os }}-windows-build-${{ hashFiles('pubspec.lock', 'windows/CMakeLists.txt', 'windows/flutter/CMakeLists.txt', 'windows/runner/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-windows-build-

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Package Windows x64 Portable
        shell: pwsh
        run: |
          $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$'
          $version = $versionLine.Matches[0].Groups[1].Value.Split('+')[0]
          $tag = "v$version"
          New-Item -ItemType Directory -Path artifacts -Force
          $bundle = "artifacts\windows-x64\payroll_app"
          New-Item -ItemType Directory -Path $bundle, "$bundle\data" -Force
          Copy-Item -Path build\windows\x64\runner\Release\* -Destination $bundle -Recurse -Force
          Copy-Item -Path windows\flutter\ephemeral\flutter_windows.dll -Destination $bundle -Force
          Copy-Item -Path windows\flutter\ephemeral\icudtl.dat -Destination "$bundle\data" -Force
          Copy-Item -Path build\flutter_assets -Destination "$bundle\data\flutter_assets" -Recurse -Force
          Copy-Item -Path build\windows\app.so -Destination "$bundle\data" -Force
          Get-ChildItem -Path build\windows\x64\plugins -Recurse -Filter *.dll | Copy-Item -Destination $bundle -Force
          Get-ChildItem -Path build\windows\x64\pdfium-src\bin -Filter *.dll | Copy-Item -Destination $bundle -Force
          if (Test-Path build\native_assets\windows) {
            Get-ChildItem -Path build\native_assets\windows -Filter *.dll | Copy-Item -Destination $bundle -Force
          }
          Compress-Archive -Path "$bundle\*" -DestinationPath "artifacts/payroll-app-${tag}-windows-x64-portable.zip"

      - name: Upload Windows portable
        uses: actions/upload-artifact@v7
        with:
          name: windows-portable
          path: artifacts/*.zip
          if-no-files-found: error

  release:
    name: Create pre-release
    runs-on: windows-latest
    needs:
      - build_android
      - build_windows
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release metadata
        shell: pwsh
        run: |
          $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$'
          $version = $versionLine.Matches[0].Groups[1].Value.Split('+')[0]
          $displayVersion = $version -replace '-alpha$', ''
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TITLE=🚀 HvM $displayVersion Alpha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_TITLE }}
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*.apk
            artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
