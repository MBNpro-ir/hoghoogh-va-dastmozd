name: Build release artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --build-name=0.0.3-alpha --build-number=3

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: payroll-app-android
          path: build/app/outputs/flutter-apk/app-release.apk

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release --build-name=0.0.3-alpha --build-number=3

      - name: Package Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          $bundle = "artifacts\windows\payroll_app"
          New-Item -ItemType Directory -Path $bundle, "$bundle\data" -Force
          Copy-Item -Path build\windows\x64\runner\Release\* -Destination $bundle -Recurse -Force
          Copy-Item -Path windows\flutter\ephemeral\flutter_windows.dll -Destination $bundle -Force
          Copy-Item -Path windows\flutter\ephemeral\icudtl.dat -Destination "$bundle\data" -Force
          Copy-Item -Path build\flutter_assets -Destination "$bundle\data\flutter_assets" -Recurse -Force
          Copy-Item -Path build\windows\app.so -Destination "$bundle\data" -Force
          Get-ChildItem -Path build\windows\x64\plugins -Recurse -Filter *.dll | Copy-Item -Destination $bundle -Force
          Get-ChildItem -Path build\windows\x64\pdfium-src\bin -Filter *.dll | Copy-Item -Destination $bundle -Force
          if (Test-Path build\native_assets\windows) {
            Get-ChildItem -Path build\native_assets\windows -Filter *.dll | Copy-Item -Destination $bundle -Force
          }
          Compress-Archive -Path "$bundle\*" -DestinationPath artifacts\payroll-app-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: payroll-app-windows
          path: artifacts/payroll-app-windows-x64.zip

  github_release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build_android
      - build_windows
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: false
          body_path: CHANGELOG.md
          files: |
            artifacts/payroll-app-android/app-release.apk
            artifacts/payroll-app-windows/payroll-app-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
