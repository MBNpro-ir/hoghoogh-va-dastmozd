name: Build release artifacts

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_STORAGE_BASE_URL: https://storage.googleapis.com
  PUB_HOSTED_URL: https://pub.dev

jobs:
  checks:
    name: Analyze and test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build_android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Use official Gradle distribution on CI
        run: |
          sed -i 's#^distributionUrl=.*#distributionUrl=https\\://services.gradle.org/distributions/gradle-9.1.0-all.zip#' android/gradle/wrapper/gradle-wrapper.properties

      - name: Use official Android repositories on CI
        run: |
          sed -i '/maven\.myket\.ir/d;/en-mirror\.ir/d' android/settings.gradle.kts android/build.gradle.kts

      - name: Get dependencies
        run: flutter pub get

      - name: Build APKs
        run: flutter build apk --release --split-per-abi --target-platform=android-arm,android-arm64

      - name: Build universal APK
        run: flutter build apk --release

      - name: Stage Android APKs
        run: |
          tag="${{ github.ref_name }}"
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "artifacts/payroll-app-${tag}-android-arm.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "artifacts/payroll-app-${tag}-android-arm64.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "artifacts/payroll-app-${tag}-android-universal.apk"

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: artifacts/*.apk
          if-no-files-found: error

  build_windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Package Windows x64 Portable
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Path artifacts -Force
          $bundle = "artifacts\windows-x64\payroll_app"
          New-Item -ItemType Directory -Path $bundle, "$bundle\data" -Force
          Copy-Item -Path build\windows\x64\runner\Release\* -Destination $bundle -Recurse -Force
          Copy-Item -Path windows\flutter\ephemeral\flutter_windows.dll -Destination $bundle -Force
          Copy-Item -Path windows\flutter\ephemeral\icudtl.dat -Destination "$bundle\data" -Force
          Copy-Item -Path build\flutter_assets -Destination "$bundle\data\flutter_assets" -Recurse -Force
          Copy-Item -Path build\windows\app.so -Destination "$bundle\data" -Force
          Get-ChildItem -Path build\windows\x64\plugins -Recurse -Filter *.dll | Copy-Item -Destination $bundle -Force
          Get-ChildItem -Path build\windows\x64\pdfium-src\bin -Filter *.dll | Copy-Item -Destination $bundle -Force
          if (Test-Path build\native_assets\windows) {
            Get-ChildItem -Path build\native_assets\windows -Filter *.dll | Copy-Item -Destination $bundle -Force
          }
          Compress-Archive -Path "$bundle\*" -DestinationPath "artifacts/payroll-app-${tag}-windows-x64-portable.zip"

      - name: Upload Windows portable
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: artifacts/*.zip
          if-no-files-found: error

  release:
    name: Create pre-release
    runs-on: windows-latest
    needs:
      - checks
      - build_android
      - build_windows
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: false
          body_path: CHANGELOG.md
          files: |
            artifacts/payroll-app-${{ github.ref_name }}-android-arm.apk
            artifacts/payroll-app-${{ github.ref_name }}-android-arm64.apk
            artifacts/payroll-app-${{ github.ref_name }}-android-universal.apk
            artifacts/payroll-app-${{ github.ref_name }}-windows-x64-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
