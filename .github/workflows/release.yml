name: Build release artifacts

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: true

env:
  FLUTTER_STORAGE_BASE_URL: https://storage.googleapis.com
  PUB_HOSTED_URL: https://pub.dev
  FLUTTER_VERSION: '3.44.4'
  # Restore-only caches from the successful v0.9.10-alpha release.
  # Change these keys only when a cache refresh is intentional.
  FLUTTER_LINUX_CACHE_KEY: flutter-linux-stable-3.44.4-x64-ad70ec4617166f1c38e5d2bfd388af71fda14f06
  FLUTTER_LINUX_PUB_CACHE_KEY: flutter-pub-linux-stable-3.44.4-x64-ad70ec4617166f1c38e5d2bfd388af71fda14f06-fa5096b38cdd9bb7e0a5c4eabc8033b1182508354db4e470ab1392c6d8202edd-fa5096b38cdd9bb7e0a5c4eabc8033b1182508354db4e470ab1392c6d8202edd
  FLUTTER_WINDOWS_CACHE_KEY: flutter-windows-stable-3.44.4-x64-ad70ec4617166f1c38e5d2bfd388af71fda14f06
  FLUTTER_WINDOWS_PUB_CACHE_KEY: flutter-pub-windows-stable-3.44.4-x64-ad70ec4617166f1c38e5d2bfd388af71fda14f06-449345a9d4d0b1fc88512b9858f419c9a00d07467462fc9d2dae80cb65fd48b7-449345a9d4d0b1fc88512b9858f419c9a00d07467462fc9d2dae80cb65fd48b7
  ANDROID_BUILD_CACHE_KEY: Linux-android-build-153b399a8e0a50b12af65e6a8f877c460715a63f1fe2f9b8b35a36af8d326afe
  WINDOWS_BUILD_CACHE_KEY: Windows-windows-build-eab3f076b15ba2439a8b158e148e342962dd4f41f1ab049020ea05bce7aeb87d

jobs:
  build_android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Restore Flutter SDK cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.tool_cache }}/flutter/stable-3.44.4-x64
          key: ${{ env.FLUTTER_LINUX_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Restore Flutter pub cache
        uses: actions/cache/restore@v5
        with:
          path: /home/runner/.pub-cache
          key: ${{ env.FLUTTER_LINUX_PUB_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false
          pub-cache: false

      - name: Restore Android build cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .dart_tool
            build
            android/.gradle
          key: ${{ env.ANDROID_BUILD_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Build APKs
        run: flutter build apk --release --split-per-abi --target-platform=android-arm,android-arm64

      - name: Build universal APK
        run: flutter build apk --release

      - name: Stage Android APKs
        run: |
          version="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          tag="v${version}"
          mkdir -p artifacts
          cp "$(find build/app/outputs -name 'app-armeabi-v7a-release.apk' -print -quit)" "artifacts/payroll-app-${tag}-android-arm.apk"
          cp "$(find build/app/outputs -name 'app-arm64-v8a-release.apk' -print -quit)" "artifacts/payroll-app-${tag}-android-arm64.apk"
          cp "$(find build/app/outputs -name 'app-release.apk' -print -quit)" "artifacts/payroll-app-${tag}-android-universal.apk"

      - name: Upload Android APKs
        uses: actions/upload-artifact@v7
        with:
          name: android-apks
          path: artifacts/*.apk
          if-no-files-found: error

  build_windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          if (dotnet tool list --global | Select-String -SimpleMatch "vpk") {
            dotnet tool update --global vpk --version 1.2.0
          } else {
            dotnet tool install --global vpk --version 1.2.0
          }
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Restore Flutter SDK cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.tool_cache }}/flutter/stable-3.44.4-x64
          key: ${{ env.FLUTTER_WINDOWS_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Restore Flutter pub cache
        uses: actions/cache/restore@v5
        with:
          path: C:\Users\runneradmin\AppData\Local\Pub\Cache
          key: ${{ env.FLUTTER_WINDOWS_PUB_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false
          pub-cache: false

      - name: Restore Windows build cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .dart_tool
            build/windows
            ~/.nuget/packages
          key: ${{ env.WINDOWS_BUILD_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Publish Windows updater helper
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          $helperOut = Join-Path $releaseDir "hvm-updater-publish"
          dotnet publish "tools\HvMUpdater\HvMUpdater.csproj" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o $helperOut
          Copy-Item -Path (Join-Path $helperOut "hvm_updater.exe") -Destination (Join-Path $releaseDir "hvm_updater.exe") -Force
          Remove-Item -LiteralPath $helperOut -Recurse -Force

      - name: Package Windows x64 Portable
        shell: pwsh
        run: |
          $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$'
          $version = $versionLine.Matches[0].Groups[1].Value.Split('+')[0]
          $tag = "v$version"
          New-Item -ItemType Directory -Path artifacts -Force
          $bundle = "artifacts\windows-x64\payroll_app"
          New-Item -ItemType Directory -Path $bundle, "$bundle\data" -Force
          Copy-Item -Path build\windows\x64\runner\Release\* -Destination $bundle -Recurse -Force
          Copy-Item -Path windows\flutter\ephemeral\flutter_windows.dll -Destination $bundle -Force
          Copy-Item -Path windows\flutter\ephemeral\icudtl.dat -Destination "$bundle\data" -Force
          Copy-Item -Path build\flutter_assets -Destination "$bundle\data\flutter_assets" -Recurse -Force
          Copy-Item -Path build\windows\app.so -Destination "$bundle\data" -Force
          Get-ChildItem -Path build\windows\x64\plugins -Recurse -Filter *.dll | Copy-Item -Destination $bundle -Force
          Get-ChildItem -Path build\windows\x64\pdfium-src\bin -Filter *.dll | Copy-Item -Destination $bundle -Force
          if (Test-Path build\native_assets\windows) {
            Get-ChildItem -Path build\native_assets\windows -Filter *.dll | Copy-Item -Destination $bundle -Force
          }
          Compress-Archive -Path "$bundle\*" -DestinationPath "artifacts/payroll-app-${tag}-windows-x64-portable.zip"

      - name: Package Windows x64 with Velopack
        shell: pwsh
        run: |
          $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$'
          $version = $versionLine.Matches[0].Groups[1].Value.Split('+')[0]
          New-Item -ItemType Directory -Path artifacts\velopack -Force
          vpk pack `
            --packId "ir.mbnpro.hvm" `
            --packVersion $version `
            --packDir "build\windows\x64\runner\Release" `
            --mainExe "payroll_app.exe" `
            --channel "win" `
            --packTitle "HvM" `
            --packAuthors "MBNpro" `
            --icon "windows\runner\resources\app_icon.ico" `
            --releaseNotes "RELEASE_NOTES.md" `
            --skipVeloAppCheck `
            --outputDir "artifacts\velopack"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            artifacts/*.zip
            artifacts/velopack/*
          if-no-files-found: error

  release:
    name: Create pre-release
    runs-on: windows-latest
    needs:
      - build_android
      - build_windows
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release metadata
        shell: pwsh
        run: |
          $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$'
          $version = $versionLine.Matches[0].Groups[1].Value.Split('+')[0]
          $displayVersion = $version -replace '-alpha$', ''
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TITLE=🚀 HvM $displayVersion Alpha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_TITLE }}
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*.apk
            artifacts/*.zip
            artifacts/velopack/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
