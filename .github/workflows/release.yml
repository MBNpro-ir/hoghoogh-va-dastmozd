name: Build release artifacts

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_all:
    name: Analyze, test, build (Android + Windows) and release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi --target-platform=android-arm,android-arm64,android-x64

      - name: Build Windows x64
        run: flutter build windows --release

      - name: Package Windows x64
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          $bundle = "artifacts\windows-x64\payroll_app"
          New-Item -ItemType Directory -Path $bundle, "$bundle\data" -Force
          Copy-Item -Path build\windows\x64\runner\Release\* -Destination $bundle -Recurse -Force
          Copy-Item -Path windows\flutter\ephemeral\flutter_windows.dll -Destination $bundle -Force
          Copy-Item -Path windows\flutter\ephemeral\icudtl.dat -Destination "$bundle\data" -Force
          Copy-Item -Path build\flutter_assets -Destination "$bundle\data\flutter_assets" -Recurse -Force
          Copy-Item -Path build\windows\app.so -Destination "$bundle\data" -Force
          Get-ChildItem -Path build\windows\x64\plugins -Recurse -Filter *.dll | Copy-Item -Destination $bundle -Force
          Get-ChildItem -Path build\windows\x64\pdfium-src\bin -Filter *.dll | Copy-Item -Destination $bundle -Force
          if (Test-Path build\native_assets\windows) {
            Get-ChildItem -Path build\native_assets\windows -Filter *.dll | Copy-Item -Destination $bundle -Force
          }
          Compress-Archive -Path "$bundle\*" -DestinationPath artifacts\payroll-app-windows-x64.zip

      - name: Stage Android APKs
        shell: pwsh
        run: |
          Copy-Item -Path build\app\outputs\flutter-apk\app-armeabi-v7a-release.apk -Destination artifacts\payroll-app-android-arm.apk -Force
          Copy-Item -Path build\app\outputs\flutter-apk\app-arm64-v8a-release.apk   -Destination artifacts\payroll-app-android-arm64.apk -Force
          Copy-Item -Path build\app\outputs\flutter-apk\app-x86_64-release.apk      -Destination artifacts\payroll-app-android-x64.apk -Force

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: false
          body_path: CHANGELOG.md
          files: |
            artifacts/payroll-app-android-arm.apk
            artifacts/payroll-app-android-arm64.apk
            artifacts/payroll-app-android-x64.apk
            artifacts/payroll-app-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
